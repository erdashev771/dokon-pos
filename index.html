<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DokonPOS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0d14;--bg2:#12141f;--bg3:#191c2b;--bd:#222536;--acc:#4f7eff;--acc2:#3a67ee;--text:#dde2f0;--muted:#56607a;--muted2:#2e3348;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--r:10px;--bnav:60px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 14px;position:fixed;top:0;left:0;right:0;z-index:60}
.logo{font-size:16px;font-weight:700;color:var(--acc);letter-spacing:-.3px}
.logo em{color:var(--text);font-style:normal}
.clock{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--bg3);padding:4px 10px;border-radius:20px;border:1px solid var(--bd)}
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--bnav);background:var(--bg2);border-top:1px solid var(--bd);display:flex;z-index:60}
.bnav-btn{flex:1;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;transition:color .15s;padding:8px 0}
.bnav-btn .ic{font-size:19px;line-height:1}
.bnav-btn.on{color:var(--acc)}
.app{position:fixed;top:52px;left:0;right:0;bottom:var(--bnav);overflow:hidden;display:flex}
@media(min-width:900px){
  .bnav{display:none}.app{bottom:0}
  .sidenav{width:190px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:14px 8px;gap:3px;flex-shrink:0}
  .snav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;width:100%;text-align:left;transition:all .15s}
  .snav-btn .ic{font-size:15px}
  .snav-btn.on{background:#4f7eff15;color:var(--acc)}
  .snav-btn:hover:not(.on){background:#ffffff08;color:var(--text)}
  .snav-div{height:1px;background:var(--bd);margin:8px 4px}
}
@media(max-width:899px){.sidenav{display:none}}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.page{display:none;height:100%}
.page.on{display:flex;flex-direction:column}
#pg-kassa.on{flex-direction:column}
@media(min-width:700px){#pg-kassa.on{flex-direction:row}}
.prod-side{display:flex;flex-direction:column;flex:1;min-width:0;overflow:hidden}
.prod-head{padding:12px 12px 8px;display:flex;flex-direction:column;gap:7px;background:var(--bg)}
.search-box{position:relative}
.search-box span{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.search-inp{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:9px 12px 9px 32px;color:var(--text);font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
.search-inp:focus{border-color:#4f7eff55}
.search-inp::placeholder{color:var(--muted)}
.cats{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px}
.cats::-webkit-scrollbar{display:none}
.cat{flex-shrink:0;padding:4px 12px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;white-space:nowrap}
.cat.on{background:var(--acc);border-color:var(--acc);color:#fff}
.prod-wrap{flex:1;overflow-y:auto;padding:8px 10px 10px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px}
@media(max-width:480px){.pgrid{grid-template-columns:repeat(3,1fr);gap:6px}}
.pcard{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 9px;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:4px;user-select:none}
.pcard:active{transform:scale(.94);background:var(--bg3)}
@media(hover:hover){.pcard:hover{border-color:#4f7eff40;background:var(--bg3)}}
.pcard.nostock{opacity:.4;cursor:not-allowed}
.p-em{font-size:24px;line-height:1}
.p-nm{font-size:11px;font-weight:600;line-height:1.3;color:var(--text)}
.p-pr{font-size:12px;font-weight:700;color:var(--acc);font-family:'DM Mono',monospace}
.p-st{font-size:10px;color:var(--muted)}
.p-st.low{color:var(--warn)}.p-st.out{color:var(--err)}
.cart{background:var(--bg2);display:flex;flex-direction:column;border-top:1px solid var(--bd);overflow:hidden}
@media(max-width:699px){.cart{height:0;transition:height .3s cubic-bezier(.4,0,.2,1)}.cart.open{height:58vh;border-top:1px solid var(--bd)}}
@media(min-width:700px){.cart{width:300px;border-top:none;border-left:1px solid var(--bd)}}
@media(min-width:1100px){.cart{width:340px}}
.cart-top{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-bottom:1px solid var(--bd);cursor:pointer;flex-shrink:0}
@media(min-width:700px){.cart-top{cursor:default}}
.cart-lbl{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.cbadge{background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace}
.ctoggle{color:var(--muted);font-size:16px;transition:transform .3s}
.ctoggle.up{transform:rotate(180deg)}
@media(min-width:700px){.ctoggle{display:none}}
.citems{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px}
.cempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:6px;padding:20px}
.cempty-ic{font-size:32px;opacity:.25}
.ci{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:7px 9px;display:flex;align-items:center;gap:7px;animation:slin .15s ease}
@keyframes slin{from{opacity:0;transform:translateX(6px)}to{opacity:1;transform:none}}
.ci-em{font-size:16px;flex-shrink:0}
.ci-inf{flex:1;min-width:0}
.ci-nm{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-sub{font-size:10px;color:var(--muted)}
.ci-qty{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qbtn{width:20px;height:20px;border-radius:5px;border:1px solid var(--bd);background:var(--bg2);color:var(--text);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qbtn:active{background:var(--acc);border-color:var(--acc)}
.qn{font-size:12px;font-weight:700;min-width:16px;text-align:center;font-family:'DM Mono',monospace}
.ci-tot{font-size:11px;font-weight:700;color:var(--acc);font-family:'DM Mono',monospace;min-width:52px;text-align:right;flex-shrink:0}
.rmbtn{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:15px;padding:0 2px;flex-shrink:0}
.rmbtn:active{color:var(--err)}
.disc-row{padding:9px 12px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.disc-lbl{font-size:11px;color:var(--muted);white-space:nowrap}
.disc-inp{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;font-family:'DM Mono',monospace}
.disc-inp:focus{border-color:#f59e0b55}
.totals{padding:10px 13px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.trow{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
.trow .v{color:var(--text);font-family:'DM Mono',monospace}
.trow .dv{color:var(--ok);font-family:'DM Mono',monospace}
.trow.big{font-size:15px;font-weight:700;color:var(--text);padding-top:5px;border-top:1px solid var(--bd);margin-top:2px}
.trow.big .v{color:var(--acc)}
.pay-sec{padding:9px 12px 12px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.pmethods{display:flex;gap:5px}
.pbtn{flex:1;padding:7px 3px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;transition:all .15s}
.pbtn.on{background:#4f7eff15;border-color:var(--acc);color:var(--acc)}
.cash-row{display:flex;gap:6px;align-items:center}
.cash-lbl{font-size:11px;color:var(--muted);white-space:nowrap}
.cash-inp{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;font-family:'DM Mono',monospace}
.cash-inp:focus{border-color:#22c55e55}
.chg-row{display:flex;justify-content:space-between;align-items:center;background:#22c55e12;border:1px solid #22c55e30;border-radius:7px;padding:7px 11px;font-size:12px}
.chg-row .cv{font-weight:700;font-size:14px;color:var(--ok);font-family:'DM Mono',monospace}
.cobtn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.cobtn:active{background:var(--acc2);transform:scale(.98)}
.cobtn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.clearbtn{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline;align-self:center}
.fab{display:none;position:fixed;bottom:calc(var(--bnav) + 12px);right:14px;background:var(--acc);color:#fff;border:none;border-radius:50%;width:50px;height:50px;font-size:20px;cursor:pointer;z-index:40;box-shadow:0 4px 18px #4f7eff40;align-items:center;justify-content:center;transition:transform .2s}
.fab:active{transform:scale(.88)}
.fab .fc{position:absolute;top:-4px;right:-4px;background:var(--err);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;font-family:'DM Mono',monospace}
@media(max-width:699px){.fab{display:flex}}
#pg-hisob,#pg-ombor{overflow-y:auto;padding:14px;display:none;flex-direction:column;gap:12px}
#pg-hisob.on,#pg-ombor.on{display:flex}
.ph{font-size:17px;font-weight:700}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:600px){.sg{grid-template-columns:repeat(4,1fr)}}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:13px}
.sc-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc-v{font-size:17px;font-weight:700;color:var(--acc);font-family:'DM Mono',monospace}
.sc-s{font-size:10px;color:var(--muted);margin-top:2px}
.stbl{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.th{display:grid;grid-template-columns:1.6fr .7fr .5fr .85fr;padding:9px 13px;background:var(--bg);font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.tr{display:grid;grid-template-columns:1.6fr .7fr .5fr .85fr;padding:9px 13px;border-top:1px solid var(--bd);font-size:11px;transition:background .1s}
.tr:active{background:var(--bg3)}
.bdg{padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;font-family:'DM Mono',monospace}
.bdg.naqd{background:#22c55e18;color:var(--ok)}.bdg.karta{background:#4f7eff18;color:var(--acc)}.bdg.qarz{background:#f59e0b18;color:var(--warn)}
.nodata{padding:28px;text-align:center;color:var(--muted);font-size:12px}
.oh{display:flex;justify-content:space-between;align-items:center}
.addbtn{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:8px 15px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.addbtn:active{background:var(--acc2)}
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
@media(max-width:480px){.igrid{grid-template-columns:repeat(2,1fr)}}
.icard{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:11px;display:flex;flex-direction:column;gap:7px}
.ic-top{display:flex;justify-content:space-between;align-items:start}
.ic-em{font-size:20px}.ic-cat{font-size:9px;color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:4px;border:1px solid var(--bd)}
.ic-nm{font-size:12px;font-weight:700;margin-top:1px}
.ic-rs{display:flex;flex-direction:column;gap:2px}
.ic-r{display:flex;justify-content:space-between;font-size:10px}
.ic-r .l{color:var(--muted)}.ic-r .v{font-weight:600;font-family:'DM Mono',monospace}
.sb{height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.sf{height:100%;border-radius:2px;background:var(--ok);transition:width .3s}
.sf.mid{background:var(--warn)}.sf.low2{background:var(--err)}
.icbtns{display:flex;gap:4px}
.icbtn{flex:1;padding:5px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--muted);font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.icbtn:active{border-color:var(--acc);color:var(--acc)}.icbtn.d:active{border-color:var(--err);color:var(--err)}
.ov{position:fixed;inset:0;background:#000000a0;z-index:100;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:500px){.ov{align-items:center}}
.md{background:var(--bg2);border:1px solid var(--bd);border-radius:18px 18px 0 0;padding:18px 16px 26px;width:100%;max-width:440px;display:flex;flex-direction:column;gap:13px;animation:mdup .22s ease;max-height:90vh;overflow-y:auto}
@media(min-width:500px){.md{border-radius:16px}}
@keyframes mdup{from{transform:translateY(18px);opacity:0}to{opacity:1;transform:none}}
.md-handle{width:36px;height:3px;background:var(--bd);border-radius:2px;align-self:center;margin-bottom:-2px}
@media(min-width:500px){.md-handle{display:none}}
.md-title{font-size:16px;font-weight:700;text-align:center}
.rcpt{background:var(--bg);border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:6px;font-size:12px}
.rcpt-hdr{text-align:center;border-bottom:1px dashed var(--bd);padding-bottom:8px;margin-bottom:2px}
.rcpt-shop{font-size:15px;font-weight:700;color:var(--acc)}
.rcpt-sub{font-size:10px;color:var(--muted)}
.rr{display:flex;justify-content:space-between;align-items:center}
.rr .k{color:var(--muted)}.rr .v{font-family:'DM Mono',monospace;font-weight:600}
.rdiv{border-top:1px dashed var(--bd);margin:2px 0}
.r-items{display:flex;flex-direction:column;gap:4px}
.ri{display:flex;justify-content:space-between;font-size:11px}
.ri .n{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:6px}
.ri .p{font-family:'DM Mono',monospace;color:var(--muted);white-space:nowrap;font-size:10px}
.ri .t{font-family:'DM Mono',monospace;font-weight:700;white-space:nowrap;padding-left:6px}
.rtot{display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin-top:2px}
.rtot .v{color:var(--acc);font-family:'DM Mono',monospace}
.rchg{background:#22c55e12;border:1px solid #22c55e30;border-radius:6px;padding:7px 11px;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.rchg .v{font-weight:700;color:var(--ok);font-family:'DM Mono',monospace;font-size:14px}
.rcpt-footer{text-align:center;font-size:10px;color:var(--muted);border-top:1px dashed var(--bd);padding-top:8px;margin-top:2px}
.print-btn{background:var(--bg3);border:1px solid var(--bd);color:var(--text);border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%}
.print-btn:active{background:var(--bd)}
.md-ok{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%}
.md-ok:active{background:var(--acc2)}
.fgrid{display:flex;flex-direction:column;gap:9px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.fg input{background:var(--bg);border:1px solid var(--bd);border-radius:7px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;font-family:'DM Sans',sans-serif;width:100%}
.fg input:focus{border-color:#4f7eff55}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.md-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.md-cancel{background:transparent;border:1px solid var(--bd);color:var(--muted);border-radius:8px;padding:11px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.md-cancel:active{border-color:var(--err);color:var(--err)}
.toast{position:fixed;bottom:calc(var(--bnav) + 10px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bd);color:var(--text);padding:8px 16px;border-radius:20px;font-size:12px;z-index:200;white-space:nowrap;animation:tup .2s ease;pointer-events:none;font-weight:500}
@media(min-width:900px){.toast{bottom:18px}}
@keyframes tup{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
@media print{
  body *{visibility:hidden}
  #parea,#parea *{visibility:visible}
  #parea{position:fixed;left:0;top:0;width:76mm;font-family:'Courier New',monospace;font-size:11px;color:#000;background:#fff;padding:4px}
  .pl{display:flex;justify-content:space-between;margin:1px 0;font-size:11px}
  .pc{text-align:center;margin:3px 0}
  .pb{font-size:13px;font-weight:bold}
  .pd{border-top:1px dashed #000;margin:4px 0}
  .ps{font-size:10px;color:#555}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">Dokon<em>POS</em></div>
  <div class="clock" id="clock">--:--</div>
</div>
<div class="app">
  <nav class="sidenav">
    <button class="snav-btn on" onclick="goPage('kassa',this)"><span class="ic">🛒</span> Kassa</button>
    <button class="snav-btn" onclick="goPage('hisob',this)"><span class="ic">📊</span> Hisobot</button>
    <button class="snav-btn" onclick="goPage('ombor',this)"><span class="ic">📦</span> Ombor</button>
    <div class="snav-div"></div>
    <button class="snav-btn" onclick="clearAll()" style="color:var(--err)"><span class="ic">🗑️</span> Tozalash</button>
  </nav>
  <div class="content">
    <div class="page on" id="pg-kassa">
      <div class="prod-side">
        <div class="prod-head">
          <div class="search-box"><span>🔍</span><input class="search-inp" id="srch" placeholder="Mahsulot qidirish..." oninput="renderProds()"></div>
          <div class="cats" id="cats"></div>
        </div>
        <div class="prod-wrap"><div class="pgrid" id="pgrid"></div></div>
      </div>
      <div class="cart" id="cart">
        <div class="cart-top" onclick="toggleCart()">
          <div class="cart-lbl">🛒 Savat <span class="cbadge" id="cbadge">0</span></div>
          <span class="ctoggle" id="ctoggle">▲</span>
        </div>
        <div class="citems" id="citems"><div class="cempty"><div class="cempty-ic">🛒</div><div>Savat bo'sh</div></div></div>
        <div class="disc-row">
          <span class="disc-lbl">Chegirma %</span>
          <input class="disc-inp" id="disc" type="number" min="0" max="100" placeholder="0" oninput="recalc()">
        </div>
        <div class="totals" id="totals"></div>
        <div class="pay-sec">
          <div class="pmethods">
            <button class="pbtn on" id="p-naqd" onclick="selPay('naqd')">💵 Naqd</button>
            <button class="pbtn" id="p-karta" onclick="selPay('karta')">💳 Karta</button>
            <button class="pbtn" id="p-qarz" onclick="selPay('qarz')">📝 Qarz</button>
          </div>
          <div class="cash-row" id="cash-row">
            <span class="cash-lbl">Berildi (so'm):</span>
            <input class="cash-inp" id="cgiven" type="number" placeholder="0" oninput="calcChg()">
          </div>
          <div class="chg-row" id="chg-row" style="display:none"><span>Qaytim:</span><span class="cv" id="chg-val">0</span></div>
          <button class="cobtn" id="cobtn" onclick="checkout()" disabled>✓ To'lovni tasdiqlash</button>
          <button class="clearbtn" onclick="clearCart()">Savatni tozalash</button>
        </div>
      </div>
    </div>
    <div class="page" id="pg-hisob">
      <div class="ph">📊 Savdo hisoboti</div>
      <div class="sg" id="sg"></div>
      <div class="stbl">
        <div class="th"><span>Sana / Vaqt</span><span>Mahsulot</span><span>Usul</span><span style="text-align:right">Summa</span></div>
        <div id="slist"></div>
      </div>
    </div>
    <div class="page" id="pg-ombor">
      <div class="oh"><div class="ph">📦 Ombor</div><button class="addbtn" onclick="openAdd()">+ Qo'shish</button></div>
      <div class="igrid" id="igrid"></div>
    </div>
  </div>
</div>
<nav class="bnav">
  <button class="bnav-btn on" id="bn-kassa" onclick="goPage('kassa',this,true)"><span class="ic">🛒</span>Kassa</button>
  <button class="bnav-btn" id="bn-hisob" onclick="goPage('hisob',this,true)"><span class="ic">📊</span>Hisobot</button>
  <button class="bnav-btn" id="bn-ombor" onclick="goPage('ombor',this,true)"><span class="ic">📦</span>Ombor</button>
</nav>
<button class="fab" id="fab" onclick="toggleCart()">🛒<span class="fc" id="fcount">0</span></button>

<div class="ov" id="rcpt-modal" style="display:none">
  <div class="md">
    <div class="md-handle"></div>
    <div class="md-title">✅ Savdo muvaffaqiyatli!</div>
    <div class="rcpt" id="rcpt-body"></div>
    <button class="print-btn" onclick="doPrint()">🖨️ Chek chiqarish (Print)</button>
    <button class="md-ok" onclick="closeRcpt()">Yangi savdo →</button>
  </div>
</div>

<div class="ov" id="prod-modal" style="display:none">
  <div class="md">
    <div class="md-handle"></div>
    <div class="md-title" id="pm-title">➕ Mahsulot qo'shish</div>
    <div class="fgrid">
      <div class="fg"><label>Mahsulot nomi *</label><input id="fn" placeholder="Masalan: Coca-Cola 0.5L"></div>
      <div class="fr2">
        <div class="fg"><label>Sotish narxi (so'm) *</label><input id="fp" type="number" min="0" placeholder="0"></div>
        <div class="fg"><label>Sotib olish narxi</label><input id="fc" type="number" min="0" placeholder="0"></div>
      </div>
      <div class="fr2">
        <div class="fg"><label>Stok (dona) *</label><input id="fs" type="number" min="0" placeholder="0"></div>
        <div class="fg"><label>Shtrix-kod</label><input id="fb" placeholder="Ixtiyoriy"></div>
      </div>
      <div class="fr2">
        <div class="fg"><label>Kategoriya</label><input id="fcat" placeholder="Masalan: Ichimlik"></div>
        <div class="fg"><label>Emoji belgisi</label><input id="fem" placeholder="🛍️"></div>
      </div>
    </div>
    <div class="md-btns">
      <button class="md-cancel" onclick="closeProd()">Bekor</button>
      <button class="md-ok" onclick="saveProd()" style="width:auto">💾 Saqlash</button>
    </div>
  </div>
</div>

<div id="parea" style="display:none"></div>

<script>
const DB={
  prods(){try{const d=localStorage.getItem('pos_p');return d?JSON.parse(d):defProds()}catch{return defProds()}},
  saveP(p){localStorage.setItem('pos_p',JSON.stringify(p))},
  sales(){try{const d=localStorage.getItem('pos_s');return d?JSON.parse(d):[]}catch{return[]}},
  addSale(s){const a=this.sales();a.unshift(s);if(a.length>500)a.length=500;localStorage.setItem('pos_s',JSON.stringify(a))}
};
function defProds(){return[
  {id:1,name:'Coca-Cola 0.5L',price:8000,cost:5000,stock:48,cat:'Ichimlik',em:'🥤',barcode:''},
  {id:2,name:'Pepsi 0.5L',price:7500,cost:4500,stock:32,cat:'Ichimlik',em:'🥤',barcode:''},
  {id:3,name:'Fanta 0.5L',price:7500,cost:4500,stock:20,cat:'Ichimlik',em:'🧡',barcode:''},
  {id:4,name:'Non lavash',price:4000,cost:2000,stock:20,cat:'Non',em:'🫓',barcode:''},
  {id:5,name:'Sut 1L',price:12000,cost:8000,stock:15,cat:'Sut mahsuloti',em:'🥛',barcode:''},
  {id:6,name:'Qatiq 0.5L',price:9000,cost:6000,stock:18,cat:'Sut mahsuloti',em:'🍶',barcode:''},
  {id:7,name:'Keks',price:5000,cost:2500,stock:30,cat:'Shirinlik',em:'🧁',barcode:''},
  {id:8,name:'Shokolad',price:15000,cost:9000,stock:25,cat:'Shirinlik',em:'🍫',barcode:''},
  {id:9,name:"Choy ko'k",price:18000,cost:12000,stock:10,cat:'Choy',em:'🍵',barcode:''},
  {id:10,name:'Qahva 3in1',price:3500,cost:1800,stock:60,cat:'Ichimlik',em:'☕',barcode:''},
  {id:11,name:'Limon',price:2000,cost:800,stock:40,cat:'Meva',em:'🍋',barcode:''},
  {id:12,name:'Banan',price:12000,cost:7000,stock:3,cat:'Meva',em:'🍌',barcode:''},
  {id:13,name:'Olma',price:8000,cost:4000,stock:35,cat:'Meva',em:'🍎',barcode:''},
  {id:14,name:'Makaron',price:6500,cost:4000,stock:22,cat:'Oziq-ovqat',em:'🍝',barcode:''},
  {id:15,name:'Shakar 1kg',price:14000,cost:10000,stock:12,cat:'Oziq-ovqat',em:'🍬',barcode:''},
  {id:16,name:'Tuz 1kg',price:4500,cost:2500,stock:8,cat:'Oziq-ovqat',em:'🧂',barcode:''},
  {id:17,name:"Yog' 1L",price:22000,cost:16000,stock:14,cat:'Oziq-ovqat',em:'🫙',barcode:''},
  {id:18,name:'Guruch 1kg',price:16000,cost:11000,stock:20,cat:'Oziq-ovqat',em:'🍚',barcode:''},
];}
let cart=[],payMethod='naqd',activeCat='Barchasi',editId=null,cartOpen=false,lastSale=null;
window.onload=()=>{DB.prods();renderCats();renderProds();recalc();tick();setInterval(tick,1000);};
function tick(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleDateString('uz-UZ')+' '+n.toLocaleTimeString('uz-UZ',{hour:'2-digit',minute:'2-digit'});}
function goPage(p,btn,mobile){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('on'));
  document.getElementById('pg-'+p).classList.add('on');
  document.querySelectorAll('.snav-btn,.bnav-btn').forEach(e=>e.classList.remove('on'));
  if(btn)btn.classList.add('on');
  ['kassa','hisob','ombor'].forEach(k=>{const b=document.getElementById('bn-'+k);if(b)b.classList.toggle('on',k===p);});
  document.querySelectorAll('.snav-btn').forEach(b=>{const t=b.textContent;if((p==='kassa'&&t.includes('Kassa'))||(p==='hisob'&&t.includes('Hisobot'))||(p==='ombor'&&t.includes('Ombor')))b.classList.add('on');});
  if(p==='hisob')renderHisob();if(p==='ombor')renderOmbor();
}
function renderCats(){
  const cats=['Barchasi',...new Set(DB.prods().map(p=>p.cat))];
  document.getElementById('cats').innerHTML=cats.map(c=>`<button class="cat${c===activeCat?' on':''}" onclick="filterCat('${c}')">${c}</button>`).join('');
}
function filterCat(c){activeCat=c;renderCats();renderProds();}
function renderProds(){
  const q=document.getElementById('srch').value.toLowerCase();
  const f=DB.prods().filter(p=>(activeCat==='Barchasi'||p.cat===activeCat)&&(p.name.toLowerCase().includes(q)||(p.barcode&&p.barcode.includes(q))));
  const g=document.getElementById('pgrid');
  if(!f.length){g.innerHTML='<div style="color:var(--muted);font-size:12px;padding:20px;grid-column:1/-1;text-align:center">Mahsulot topilmadi</div>';return;}
  g.innerHTML=f.map(p=>{
    const sc=p.stock===0?'out':p.stock<=5?'low':'';
    const sl=p.stock===0?'Tugagan':p.stock<=5?`Kam: ${p.stock}`:`${p.stock} dona`;
    return `<div class="pcard${p.stock===0?' nostock':''}" onclick="addCart(${p.id})"><div class="p-em">${p.em}</div><div class="p-nm">${p.name}</div><div class="p-pr">${M(p.price)}</div><div class="p-st ${sc}">${sl}</div></div>`;
  }).join('');
}
function addCart(id){
  const prods=DB.prods();const prod=prods.find(p=>p.id===id);
  if(!prod||prod.stock===0){toast('Mahsulot tugagan!');return;}
  const ex=cart.find(c=>c.id===id);
  if(ex){if(ex.qty>=prod.stock){toast('Stokda yetarli emas!');return;}ex.qty++;}
  else cart.push({id,name:prod.name,price:prod.price,qty:1,em:prod.em});
  renderCart();if(cart.length===1&&window.innerWidth<700)openCart();
}
function chgQ(id,d){const it=cart.find(c=>c.id===id);if(!it)return;it.qty+=d;if(it.qty<=0)cart=cart.filter(c=>c.id!==id);renderCart();}
function rmItem(id){cart=cart.filter(c=>c.id!==id);renderCart();}
function clearCart(){cart=[];document.getElementById('disc').value='';document.getElementById('cgiven').value='';document.getElementById('chg-row').style.display='none';renderCart();}
function renderCart(){
  const total=cart.reduce((s,c)=>s+c.qty,0);
  document.getElementById('cbadge').textContent=total;document.getElementById('fcount').textContent=total;
  const el=document.getElementById('citems');
  if(!cart.length){el.innerHTML='<div class="cempty"><div class="cempty-ic">🛒</div><div>Savat bo\'sh</div></div>';}
  else el.innerHTML=cart.map(c=>`<div class="ci"><div class="ci-em">${c.em}</div><div class="ci-inf"><div class="ci-nm">${c.name}</div><div class="ci-sub">${M(c.price)} × ${c.qty} = ${M(c.price*c.qty)}</div></div><div class="ci-qty"><button class="qbtn" onclick="chgQ(${c.id},-1)">−</button><span class="qn">${c.qty}</span><button class="qbtn" onclick="chgQ(${c.id},1)">+</button></div><div class="ci-tot">${M(c.price*c.qty)}</div><button class="rmbtn" onclick="rmItem(${c.id})">×</button></div>`).join('');
  recalc();
}
function getCalc(){
  const subtotal=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc=Math.min(100,Math.max(0,parseFloat(document.getElementById('disc').value)||0));
  const discAmt=Math.round(subtotal*disc/100);
  return{subtotal,disc,discAmt,total:subtotal-discAmt};
}
function recalc(){
  const{subtotal,disc,discAmt,total}=getCalc();
  const itemCount=cart.reduce((s,c)=>s+c.qty,0);
  let h=`<div class="trow"><span>Mahsulotlar (${itemCount} dona):</span><span class="v">${M(subtotal)}</span></div>`;
  if(discAmt>0)h+=`<div class="trow"><span>Chegirma (${disc}%):</span><span class="dv">— ${M(discAmt)}</span></div>`;
  h+=`<div class="trow big"><span>TO'LOV SUMMASI:</span><span class="v">${M(total)}</span></div>`;
  document.getElementById('totals').innerHTML=h;
  document.getElementById('cobtn').disabled=cart.length===0;
  calcChg();
}
function calcChg(){
  if(payMethod!=='naqd'){document.getElementById('chg-row').style.display='none';return;}
  const given=parseFloat(document.getElementById('cgiven').value)||0;
  const{total}=getCalc();
  if(given>0){
    const chg=given-total;const el=document.getElementById('chg-val');
    document.getElementById('chg-row').style.display='flex';
    el.textContent=chg>=0?M(chg):`${M(Math.abs(chg))} yetishmaydi`;
    el.style.color=chg>=0?'var(--ok)':'var(--err)';
  }else document.getElementById('chg-row').style.display='none';
}
function selPay(m){
  payMethod=m;['naqd','karta','qarz'].forEach(p=>document.getElementById('p-'+p).classList.toggle('on',p===m));
  document.getElementById('cash-row').style.display=m==='naqd'?'flex':'none';
  document.getElementById('chg-row').style.display='none';document.getElementById('cgiven').value='';
}
function toggleCart(){cartOpen=!cartOpen;document.getElementById('cart').classList.toggle('open',cartOpen);document.getElementById('ctoggle').classList.toggle('up',cartOpen);}
function openCart(){if(!cartOpen){cartOpen=true;document.getElementById('cart').classList.add('open');document.getElementById('ctoggle').classList.add('up');}}
function checkout(){
  if(!cart.length)return;
  const{subtotal,disc,discAmt,total}=getCalc();
  const given=parseFloat(document.getElementById('cgiven').value)||0;
  if(payMethod==='naqd'&&given>0&&given<total){toast('Berilgan summa yetarli emas!');return;}
  const change=payMethod==='naqd'&&given>0?given-total:0;
  const prods=DB.prods();
  cart.forEach(ci=>{const p=prods.find(x=>x.id===ci.id);if(p)p.stock=Math.max(0,p.stock-ci.qty);});
  DB.saveP(prods);
  const now=new Date();
  const sale={id:Date.now(),no:String(Date.now()).slice(-6),time:now.toLocaleTimeString('uz-UZ',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),date:now.toLocaleDateString('uz-UZ'),items:cart.map(c=>({...c})),subtotal,disc,discAmt,total,payMethod,given:payMethod==='naqd'?given:0,change:payMethod==='naqd'?change:0,itemCount:cart.reduce((s,c)=>s+c.qty,0)};
  DB.addSale(sale);lastSale=sale;showReceipt(sale);
  cart=[];document.getElementById('disc').value='';document.getElementById('cgiven').value='';
  renderProds();renderCats();
}
function showReceipt(s){
  document.getElementById('rcpt-body').innerHTML=`
    <div class="rcpt-hdr"><div class="rcpt-shop">🏪 DokonPOS</div><div class="rcpt-sub">${s.date} | Soat ${s.time}</div><div class="rcpt-sub">Chek №${s.no}</div></div>
    <div class="r-items">${s.items.map(i=>`<div class="ri"><span class="n">${i.em} ${i.name}</span><span class="p">${M(i.price)}×${i.qty}</span><span class="t">${M(i.price*i.qty)}</span></div>`).join('')}</div>
    <div class="rdiv"></div>
    <div class="rr"><span class="k">Jami (${s.itemCount} dona):</span><span class="v">${M(s.subtotal)}</span></div>
    ${s.discAmt>0?`<div class="rr"><span class="k" style="color:var(--ok)">Chegirma (${s.disc}%):</span><span class="v" style="color:var(--ok)">— ${M(s.discAmt)}</span></div>`:''}
    <div class="rdiv"></div>
    <div class="rtot"><span>TO'LOV:</span><span class="v">${M(s.total)}</span></div>
    <div class="rr"><span class="k">To'lov usuli:</span><span class="v">${s.payMethod.toUpperCase()}</span></div>
    ${s.payMethod==='naqd'&&s.given>0?`<div class="rr"><span class="k">Berildi:</span><span class="v">${M(s.given)}</span></div><div class="rchg"><span>💚 Qaytim:</span><span class="v">${M(s.change)}</span></div>`:''}
    <div class="rcpt-footer">Xaridingiz uchun rahmat! 🙏<br>Yana keling!</div>`;
  document.getElementById('rcpt-modal').style.display='flex';
}

function closeRcpt(){document.getElementById('rcpt-modal').style.display='none';renderCart();}
function doPrint(){
  if(!lastSale)return;const s=lastSale;
  const pa=document.getElementById('parea');pa.style.display='block';
  pa.innerHTML=`<div class="pc pb">🏪 DokonPOS</div><div class="pc">${s.date}  ${s.time}</div><div class="pc">Chek No${s.no}</div><div class="pd"></div>${s.items.map(i=>`<div class="pl"><span>${i.em} ${i.name}</span><span>${M(i.price*i.qty)}</span></div><div class="pl ps"><span>  ${M(i.price)} x ${i.qty} dona</span></div>`).join('')}<div class="pd"></div><div class="pl"><span>Jami (${s.itemCount} dona):</span><span>${M(s.subtotal)}</span></div>${s.discAmt>0?`<div class="pl"><span>Chegirma (${s.disc}%):</span><span>-${M(s.discAmt)}</span></div>`:''}<div class="pd"></div><div class="pl pb"><span>TO'LOV:</span><span>${M(s.total)}</span></div><div class="pl"><span>Usul:</span><span>${s.payMethod.toUpperCase()}</span></div>${s.payMethod==='naqd'&&s.given>0?`<div class="pl"><span>Berildi:</span><span>${M(s.given)}</span></div><div class="pl pb"><span>Qaytim:</span><span>${M(s.change)}</span></div>`:''}<div class="pd"></div><div class="pc">Rahmat! Yana keling!</div><br><br><br>`;
  window.print();setTimeout(()=>{pa.style.display='none';pa.innerHTML='';},1500);
}
function renderHisob(){
  const sales=DB.sales();const prods=DB.prods();
  const today=new Date().toLocaleDateString('uz-UZ');
  const tds=sales.filter(s=>s.date===today);
  const todayRev=tds.reduce((s,x)=>s+x.total,0);
  const totalRev=sales.reduce((s,x)=>s+x.total,0);
  const totalItems=sales.reduce((s,x)=>s+x.itemCount,0);
  const profit=sales.reduce((sum,sale)=>sum+sale.items.reduce((ps,ci)=>{const p=prods.find(x=>x.id===ci.id);return ps+(ci.price-(p?p.cost:0))*ci.qty;},0)-sale.discAmt,0);
  const avg=sales.length?Math.round(totalRev/sales.length):0;
  document.getElementById('sg').innerHTML=`<div class="sc"><div class="sc-l">Bugungi savdo</div><div class="sc-v">${M(todayRev)}</div><div class="sc-s">${tds.length} operatsiya</div></div><div class="sc"><div class="sc-l">Jami aylanma</div><div class="sc-v">${M(totalRev)}</div><div class="sc-s">${sales.length} ta savdo</div></div><div class="sc"><div class="sc-l">Sof foyda</div><div class="sc-v" style="color:var(--ok)">${M(profit)}</div><div class="sc-s">Narx farqidan</div></div><div class="sc"><div class="sc-l">O'rtacha chek</div><div class="sc-v">${M(avg)}</div><div class="sc-s">${totalItems} dona sotildi</div></div>`;
  const sl=document.getElementById('slist');
  if(!sales.length){sl.innerHTML='<div class="nodata">Hali savdo yo\'q</div>';return;}
  sl.innerHTML=sales.slice(0,60).map(s=>`<div class="tr"><span style="color:var(--muted);font-size:10px">${s.date}<br>${s.time}</span><span>${s.itemCount} mahsulot</span><span><span class="bdg ${s.payMethod}">${s.payMethod}</span></span><span style="font-weight:700;color:var(--acc);font-family:'DM Mono',monospace;text-align:right">${M(s.total)}</span></div>`).join('');
}
function renderOmbor(){
  document.getElementById('igrid').innerHTML=DB.prods().map(p=>{
    const pct=Math.min(100,Math.round(p.stock/80*100));const fc=pct<20?'low2':pct<45?'mid':'';
    const vc=p.stock===0?'var(--err)':p.stock<=5?'var(--warn)':'var(--ok)';
    return `<div class="icard"><div class="ic-top"><div class="ic-em">${p.em}</div><span class="ic-cat">${p.cat}</span></div><div class="ic-nm">${p.name}</div><div class="ic-rs"><div class="ic-r"><span class="l">Sotish:</span><span class="v">${M(p.price)}</span></div><div class="ic-r"><span class="l">Xarid:</span><span class="v">${M(p.cost||0)}</span></div><div class="ic-r"><span class="l">Foyda/dona:</span><span class="v" style="color:var(--ok)">${M(p.price-(p.cost||0))}</span></div><div class="ic-r"><span class="l">Stok:</span><span class="v" style="color:${vc}">${p.stock} dona</span></div></div><div class="sb"><div class="sf ${fc}" style="width:${pct}%"></div></div><div class="icbtns"><button class="icbtn" onclick="editProd(${p.id})">✏️</button><button class="icbtn" onclick="addStock(${p.id})">+</button><button class="icbtn d" onclick="delProd(${p.id})">🗑️</button></div></div>`;
  }).join('');
}
function openAdd(){editId=null;['fn','fp','fc','fs','fb','fcat','fem'].forEach(id=>document.getElementById(id).value='');document.getElementById('pm-title').textContent="➕ Mahsulot qo'shish";document.getElementById('prod-modal').style.display='flex';}
function closeProd(){document.getElementById('prod-modal').style.display='none';editId=null;}
function editProd(id){const p=DB.prods().find(x=>x.id===id);if(!p)return;editId=id;document.getElementById('fn').value=p.name;document.getElementById('fp').value=p.price;document.getElementById('fc').value=p.cost||'';document.getElementById('fs').value=p.stock;document.getElementById('fb').value=p.barcode||'';document.getElementById('fcat').value=p.cat;document.getElementById('fem').value=p.em;document.getElementById('pm-title').textContent='✏️ Mahsulotni tahrirlash';document.getElementById('prod-modal').style.display='flex';}
function addStock(id){const qty=parseInt(prompt("Qancha dona qo'shish?")||0);if(!qty||qty<=0)return;const prods=DB.prods();const p=prods.find(x=>x.id===id);if(p){p.stock+=qty;DB.saveP(prods);renderOmbor();toast(`+${qty} dona qo'shildi ✓`);}}
function delProd(id){if(!confirm("Mahsulotni o'chirishni tasdiqlaysizmi?"))return;DB.saveP(DB.prods().filter(p=>p.id!==id));renderOmbor();renderCats();renderProds();toast("O'chirildi");}
function saveProd(){
  const name=document.getElementById('fn').value.trim();const price=parseInt(document.getElementById('fp').value)||0;
  const cost=parseInt(document.getElementById('fc').value)||0;const stock=parseInt(document.getElementById('fs').value)||0;
  const barcode=document.getElementById('fb').value.trim();const cat=document.getElementById('fcat').value.trim()||'Boshqa';const em=document.getElementById('fem').value.trim()||'📦';
  if(!name||!price){toast('Nom va narxni kiriting!');return;}
  const prods=DB.prods();
  if(editId){const p=prods.find(x=>x.id===editId);if(p)Object.assign(p,{name,price,cost,stock,barcode,cat,em});}
  else prods.push({id:Date.now(),name,price,cost,stock,barcode,cat,em});
  DB.saveP(prods);closeProd();renderOmbor();renderCats();renderProds();toast(editId?'Yangilandi ✓':"Mahsulot qo'shildi ✓");
}
function clearAll(){if(!confirm("Barcha ma'lumotlar o'chiriladi!\nDavom etasizmi?"))return;localStorage.removeItem('pos_p');localStorage.removeItem('pos_s');renderCats();renderProds();clearCart();toast('Tozalandi');}
function M(n){return Math.round(n).toLocaleString('uz-UZ')+" so'm";}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
</script>
</body>
</html>
